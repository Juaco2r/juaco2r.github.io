<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <style>
      /* purple-grey palette */
      .cyto { fill:#8E86A8; fill-opacity:0.92; }
      .mem  { fill:none; stroke:#6E668A; stroke-width:8; stroke-opacity:0.75; stroke-linecap:round; stroke-linejoin:round; }
      .nuc  { fill:#5C5478; fill-opacity:0.95; }
      .ves  { fill:#9A92B5; fill-opacity:0.55; }
      .hil  { fill:#FFFFFF; fill-opacity:0.14; }
    </style>
  </defs>

  <!-- Cytoplasm (amoeboid irregular shape) -->
  <path class="cyto" d="M150,260
           C130,210 170,150 240,130
           C300,112 360,132 400,178
           C430,214 430,260 402,304
           C370,356 318,386 260,374
           C200,362 170,318 150,260 Z"></path>

  <!-- Membrane -->
  <path class="mem" d="M150,260
           C130,210 170,150 240,130
           C300,112 360,132 400,178
           C430,214 430,260 402,304
           C370,356 318,386 260,374
           C200,362 170,318 150,260 Z"></path>

  <!-- Nucleus (eccentric, kidney-like) -->
  <path class="nuc" d="M260,210
           C300,188 340,210 352,244
           C362,278 338,310 304,320
           C270,330 240,306 232,276
           C224,244 236,224 260,210 Z"></path>

  <!-- Vesicles / inclusions -->
  <circle class="ves" cx="220" cy="260" r="18"></circle>
  <circle class="ves" cx="320" cy="290" r="14"></circle>
  <circle class="ves" cx="280" cy="340" r="12"></circle>
  <circle class="ves" cx="200" cy="320" r="10"></circle>

  <!-- subtle highlight -->
  <ellipse class="hil" cx="300" cy="170" rx="55" ry="28"></ellipse>

</svg>