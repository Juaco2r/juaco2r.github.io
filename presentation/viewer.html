<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Clinical Training | Viewer</title>
  <link rel="stylesheet" href="/assets/css/main.css"/>

  <style>
    .pdf-wrap{
      border:1px solid var(--line);
      border-radius:18px;
      background: rgba(255,255,255,0.03);
      overflow:hidden;
    }
    .pdf-toolbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:10px 12px;
      border-bottom:1px solid var(--line);
      background: rgba(0,0,0,0.18);
    }
    .pdf-toolbar .left, .pdf-toolbar .right{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }
    .btn-ic{
      border:1px solid var(--line);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border-radius:12px;
      padding:8px 10px;
      cursor:pointer;
      user-select:none;
    }
    .btn-ic:hover{ background: rgba(255,255,255,0.10); }
    .btn-ic:disabled{ opacity:0.45; cursor:not-allowed; }
    .muted{ color: var(--muted); font-size:0.92rem; }
    .pdf-stage{
      display:flex;
      justify-content:center;
      align-items:center;
      padding:12px;
      min-height: 360px;
    }
    canvas{
      max-width: 100%;
      height: auto;
      border-radius: 12px;
      background: rgba(0,0,0,0.14);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .note{
      margin-top:10px;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .error-box{
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
      background: rgba(255,255,255,0.03);
      color: var(--text);
      max-width: 780px;
    }
    .error-box code{ color: var(--muted); }

    /* --- EMBED MODE (inside iframe) --- */
    body.embed { margin: 0; }
    body.embed main.container { max-width: none !important; padding: 0 !important; }
    body.embed .section { padding: 0 !important; }
    body.embed .card{
      border: 0 !important;
      background: transparent !important;
      box-shadow: none !important;
      border-radius: 0 !important;
      padding: 0 !important;
    }
    body.embed h1, body.embed p.small { display: none !important; }
    body.embed .pdf-wrap{ border-radius: 14px; } /* para que encaje con tu iframe */
  </style>
</head>
<body>

<main class="container">
  <section class="section">
    <div class="card">
      <h1 class="h1" style="font-size:2rem;">Clinical training presentation</h1>
      <p class="small">Compilation of information as introduction to lung histology.</p>

      <div class="pdf-wrap">
        <div class="pdf-toolbar">
          <div class="left">
            <button class="btn-ic" id="prev" type="button">← Prev</button>
            <button class="btn-ic" id="next" type="button">Next →</button>
            <span class="muted">Page <span id="pageNum">1</span> / <span id="pageCount">–</span></span>
          </div>
          <div class="right">
            <button class="btn-ic" id="zoomOut" type="button">−</button>
            <button class="btn-ic" id="zoomIn" type="button">+</button>
          </div>
        </div>

        <div class="pdf-stage" id="stage">
          <canvas id="pdfCanvas"></canvas>
        </div>
      </div>

    
    </div>
  </section>
</main>

<!-- ✅ ONE script only: local PDF.js module -->
<script>
  // enable embed mode if URL contains ?embed=1
  if (new URLSearchParams(location.search).get("embed") === "1") {
    document.body.classList.add("embed");
  }
</script>
<script type="module">
  import * as pdfjsLib from "/assets/vendor/pdfjs/pdf.min.mjs";

  const PDF_URL = "/presentation/clinical-training.pdf";

  const canvas = document.getElementById("pdfCanvas");
  const ctx = canvas.getContext("2d");
  const stage = document.getElementById("stage");

  const pageNumEl = document.getElementById("pageNum");
  const pageCountEl = document.getElementById("pageCount");

  const prevBtn = document.getElementById("prev");
  const nextBtn = document.getElementById("next");
  const zoomInBtn = document.getElementById("zoomIn");
  const zoomOutBtn = document.getElementById("zoomOut");

  let pdfDoc = null;
  let pageNum = 1;
  let scale = 1.0;
  let rendering = false;
  let fitDone = false;

  function setButtons(){
    const ok = !!pdfDoc;
    prevBtn.disabled = !ok || pageNum <= 1;
    nextBtn.disabled = !ok || pageNum >= (pdfDoc ? pdfDoc.numPages : 1);
    zoomInBtn.disabled = !ok;
    zoomOutBtn.disabled = !ok;
  }

  function showError(err){
    console.error("PDF viewer error:", err);
    pageCountEl.textContent = "Error";
    stage.innerHTML = `
      <div class="error-box">
        <b>Could not load the PDF.</b><br/>
        <span class="muted">Open DevTools (F12) → Console for details.</span><br/><br/>
        <div class="muted">PDF URL:</div>
        <code>${PDF_URL}</code>
      </div>
    `;
    setButtons();
  }

  async function fitScale(page){
    const containerWidth = stage.clientWidth - 24;
    const unscaled = page.getViewport({ scale: 1.0 });
    return Math.min(2.2, Math.max(0.85, containerWidth / unscaled.width));
  }

  async function renderPage(num){
    if (!pdfDoc || rendering) return;
    rendering = true;

    try{
      const page = await pdfDoc.getPage(num);

      if (!fitDone){
        scale = await fitScale(page);
        fitDone = true;
      }

      const viewport = page.getViewport({ scale });
      canvas.width = Math.floor(viewport.width);
      canvas.height = Math.floor(viewport.height);

      await page.render({ canvasContext: ctx, viewport }).promise;

      pageNumEl.textContent = num;
      setButtons();
    } catch (e){
      showError(e);
    } finally {
      rendering = false;
    }
  }

  async function load(){
    try{
      // ✅ Local worker
      pdfjsLib.GlobalWorkerOptions.workerSrc = "/assets/vendor/pdfjs/pdf.worker.min.mjs";

      const task = pdfjsLib.getDocument({ url: PDF_URL });
      pdfDoc = await task.promise;

      pageCountEl.textContent = pdfDoc.numPages;
      setButtons();
      await renderPage(pageNum);

      // re-fit on resize
      let t = null;
      window.addEventListener("resize", () => {
        clearTimeout(t);
        t = setTimeout(async () => {
          if (!pdfDoc) return;
          fitDone = false;
          await renderPage(pageNum);
        }, 150);
      });

    } catch (e){
      showError(e);
    }
  }

  prevBtn.addEventListener("click", async () => {
    if (pageNum <= 1) return;
    pageNum -= 1;
    await renderPage(pageNum);
  });

  nextBtn.addEventListener("click", async () => {
    if (!pdfDoc || pageNum >= pdfDoc.numPages) return;
    pageNum += 1;
    await renderPage(pageNum);
  });

  zoomInBtn.addEventListener("click", async () => {
    scale = Math.min(scale + 0.15, 2.6);
    await renderPage(pageNum);
  });

  zoomOutBtn.addEventListener("click", async () => {
    scale = Math.max(scale - 0.15, 0.75);
    await renderPage(pageNum);
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowLeft") prevBtn.click();
    if (e.key === "ArrowRight") nextBtn.click();
    if (e.key === "+") zoomInBtn.click();
    if (e.key === "-") zoomOutBtn.click();
  });

  setButtons();
  load();
</script>
</body>
</html>
